    Projects:
      - name: On Pareto Optimality in Parametric Choice Bandits
        summary: Studied Pareto-optimality in parametric choice bandits and developed related theoretical results on efficient learning and tradeoffs.

      - name: Best-Arm Identification with LLM-Assisted Control Variates
        summary: Developed learning-augmented methods for best-arm identification using LLM-assisted control variates, with an emphasis on finite-sample guarantees and empirical evaluation.

      - name: Experiment Design for Online Scheduling
        summary: Studied experimental design and estimation methods for evaluating online scheduling policies, with a focus on rigorous comparisons under stochastic arrivals.

      - name: Deep Decision Optimization and SPO-related Methods
        summary: Explored optimization-oriented learning methods related to decision-focused learning and SPO, with attention to fair empirical comparison and downstream decision quality.

